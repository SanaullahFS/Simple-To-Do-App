<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
  </head>
  <style>
    :root {
      --bg-start: #0f172a;
      --bg-end: #1e293b;
      --card: rgba(15, 23, 42, 0.95);
      --card-border: rgba(148, 163, 184, 0.18);
      --surface: #f8fafc;
      --surface-soft: #e2e8f0;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --accent: #7c3aed;
      --accent-soft: #c4b5fd;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, rgba(124, 58, 237, 0.18), transparent 35%),
        linear-gradient(180deg, var(--bg-start), var(--bg-end));
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.25rem;
      gap: 1.75rem;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      max-width: 640px;
      line-height: 1.05;
      color: transparent;
      background: linear-gradient(120deg, #f8fafc 0%, #a78bfa 60%, #c7d2fe 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
    }

    .container {
      width: min(100%, 600px);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      padding: 1.5rem;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    input,
    button {
      border-radius: 18px;
      font-family: inherit;
    }

    input {
      width: 100%;
      padding: 1rem 1.25rem;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(248, 250, 252, 0.14);
      color: var(--text-primary);
      font-size: 1rem;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    input:focus {
      outline: none;
      border-color: rgba(124, 58, 237, 0.8);
      box-shadow: 0 0 0 0.3rem rgba(124, 58, 237, 0.14);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: rgba(203, 213, 225, 0.8);
    }

    button {
      padding: 1rem 1.55rem;
      border: none;
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 18px 30px rgba(124, 58, 237, 0.22);
      transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 36px rgba(124, 58, 237, 0.3);
    }

    button:active {
      transform: translateY(0);
      filter: brightness(0.95);
    }

    h2 {
      width: min(100%, 600px);
      padding: 1.75rem 1.5rem;
      min-height: 4rem;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 26px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.8;
      word-break: break-word;
      white-space: pre-wrap;
    }

    h2:empty::before {
      content: "Your tasks will appear here...";
      color: rgba(203, 213, 225, 0.7);
      font-style: italic;
    }

    @media (max-width: 520px) {
      .container {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
  <body>
    <h1>To-Do App</h1>
    <div class="container">
      <input type="text" id="input" placeholder="New Task Add from Enter or Add button  " />
      <button>Add</button>
    </div>
    <h2></h2>
  </body>
  <script>
    //  Simple TO-DO App
    console.log("Simple TO_DO App");
    console.log("================");

    let button = document.querySelector("button");
    let input = document.querySelector("#input");
    let h2 = document.querySelector("h2");

    function addTask() {
      if (!input.value.trim()) return;
      h2.innerHTML += input.value + "<br>";
      console.log(h2);
      input.value = "";
    }

    button.addEventListener("click", addTask);

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addTask();
      }
    });
  </script>
</html>
